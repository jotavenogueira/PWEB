<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de criar objetos</title>
</head>
<body>
    <script>
        var aluno1 = new Object();
        // usando Object
        aluno1.ra = "00001234";
        aluno1.nome = "Eduardo";
        alert(`RA: ${aluno1.ra}\nNome: ${aluno1.nome}`);

        var aluno2 = {}; //usando {}
        aluno2.ra = "00001235";
        aluno2["nome"] = "Gabriel";
        alert(`RA: ${aluno2.ra}\nNome: ${aluno2.nome}`);
        aluno2["email do aluno"] = "gabriel@gmail.com";
        alert("Email do aluno: " + "\n" + aluno2["email do aluno"]); // email do aluno não é identificador válido, então toda vez tem que colocar aluno2["email do aluno"]

        var aluno3 = { //literal
            ra: "000012346",
            nome: "Maria", // virgula opcional
        };
        alert(`RA: ${aluno3.ra}\nNome: ${aluno3.nome}`);

        // usando função construtora
        // this significa público
        function Aluno (ra, nome){
            this.ra = ra;
            this.nome = nome;
            this.MostraDados = function(){
                return "RA: " + this.ra + "\n" + "Nome: " + this.nome;
            }
        }
        var aluno4 = new Aluno("000012347", "Jamilly");
        alert(aluno4.MostraDados());
        alert(aluno4.nome);

        //funcao construtora sem parâmetros
        function Aluno2(){
            var ra; //encapsulado-escondido
            var nome;
            this.setRa = function (value){
                this.ra = value;
            }
            this.getRa = function(){
                return this.ra;
            }
            this.setNome = function (value){
                this.nome = value;
            }
            this.getNome = function (){
                return this.nome;
            }
        }

        var aluno6 = new Aluno2();
        aluno6.setNome("Lana");
        aluno6.setRa("0000123458");
        alert("RA: " + aluno6.getRa() + "\n" + "Nome: " + aluno6.getNome());

        function AlunoADS(){
            var numLab;
            this.setnumLab = function (value){
                this.numLab = value;
            }
            this.getnumLab = function(){
                return this.numLab;
            }
        }

        // herança
        AlunoADS.prototype = new Aluno2();
        var aluno7 = new AlunoADS();
        aluno7.setNome("Murilo");
        aluno7.setRa("0000123459");
        aluno7.setnumLab(5);
        alert(aluno7.getNome() + " " + aluno7.getnumLab());

        // usando class
        class Aluno1 {
            constructor(){
                this._ra;
                this._nome;
            }
            setNome(value){
                this._nome = value;
            }
            getNome(){
                return this._nome;
            }
            setRa (value){
                this._ra = value;
            }
            getRa(){
                return this._ra;
            }
        }

        var objAluno = new Aluno1 ();
        objAluno.setNome("Caroline");
        objAluno.setRa("0000123410");
        alert(`Nome: ${objAluno.getNome()}\nRA: ${objAluno.getRa()}`);

        class AlunoADS1 extends Aluno1 {
            constructor(){
                //super chama o construtor da classe pai
                super();
                this._numLab;
            }
            setnumLab(value){
                this._numLab = value;
            }
            getnumLab(value){
                return this._numLab;
            }
        }

        var objAlunoADS = new AlunoADS1();
        objAlunoADS.setNome("Otávio");
        objAlunoADS.setRa("00001234511");
        objAlunoADS.setnumLab(6);        
        alert(`Nome: ${objAlunoADS.getNome()}\nRA: ${objAlunoADS.getRa()}\nLab: ${objAlunoADS.getnumLab()}`);

        //OUTROS
        //Cópia de objetos
        var obj1 = new Object();
        var obj2 = obj1;
        obj1.nome = "Camila";
        alert(obj2.nome);

        //metodos e atributos - públicos e privados
        class ContaBancaria{
            #cpf; //atributo privado

            constructor (nome, saldoInicial){
                this.nome = nome; //atributo publico
                this.saldo = saldoInicial;
            }

            setCpf(value){
                this.cpf = value;
            }
            getCpf(){
                return this.cpf;
            }
            getSaldo(){
                return this.saldo;
            }
            //método público
            depositar(valor){
                this.saldo += valor;
                this.#registrarTransacao(valor);
                //Utilizando o modificador # para método privado
            }

            //metodo privado
            #registrarTransacao(valor){
                console.log(`Depósito de R$ ${valor} realizado pelo ${this.nome} e o Saldo R$ ${this.saldo} para CPF ${this.cpf} ou ${this.#cpf}`)
            }
        }
        const conta = new ContaBancaria("Gustavo", 1000);
        conta.setCpf(123456789);
        conta.depositar(500);

        //Object.fromEntries() é um método
        //JavaScript que transforma um array de
        //pares chave-valor

        const arr = [
            ['codigo', 1],
            ['nome', "João"],
            ['idade', 23]
        ];
        const obj = Object.fromEntries(arr);
        alert(obj); //imprime object
        alert(obj.nome); //imprime nome
        alert(JSON.stringify(obj));

        //alteracao no prototipo reflete no novo
        const objEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const funcionario = Object.create(objEmpresa, {
            nome: {
                value: 'Jorge'
            },
            endereco: {
                value: 'Av. São Paulo'
            }
        });

        console.log(funcionario.empresa);
        console.log(funcionario.nome);
        console.log(funcionario.endereco);

        // O método Object.assign() é usado para copiar os valores
        const objNovaEmpresa = {
            empresa: 'ZF do Brasil'
        };
        const objVeiculo = {
            placa: 'XXX 1234'
        };

        const motorista = Object.assign({
            cpf: "123"
        }, objNovaEmpresa, objVeiculo);
        console.log(motorista);

    </script>
</body>
</html>
